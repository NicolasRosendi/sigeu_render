const API = '/api';

const defaultData = () => ({

const loadData = async () => {
  try {
    const res = await fetch(`${API}/solicitudes`);
    const solicitudes = await res.json();
    return { solicitudes, entrevistas: [], becas: [] };
  } catch {
    return defaultData();
  }
};

const apiCreate = async (sol) => {
  const res = await fetch(`${API}/solicitudes`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(sol),
  });
  return res.json();
};

const apiUpdate = async (sol) => {
  const res = await fetch(`${API}/solicitudes/${sol.id}`, {
    method: 'PUT', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(sol),
  });
  return res.json();
};

const apiDelete = async (id) => {

const Badge = ({ status }) => {
  const map = {
    Admitido: { bg: COLORS.successBg, color: COLORS.success },
    "No Admitido": { bg: COLORS.dangerBg, color: COLORS.danger },
    "Lista de Espera": { bg: COLORS.warningBg, color: COLORS.warning },
    Desistió: { bg: "#f0f0f0", color: COLORS.textLight },
    "Admitido Revertido": { bg: "#fff0e6", color: "#cc6600" },
    Pendiente: { bg: COLORS.infoBg, color: COLORS.info },
  };
  const s = map[status] || map.Pendiente;
  return (
    <span className="badge" style={{ background: s.bg, color: s.color }}>
      {status}
    </span>
  );
};

// ─── Main App ───
function App() {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState("dashboard");
  const [editingSolicitud, setEditingSolicitud] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [searchTerm, setSearchTerm] = useState("");
  const [filterPrograma, setFilterPrograma] = useState("");
  const [filterEstado, setFilterEstado] = useState("");
  const [notification, setNotification] = useState(null);
  const [viewingLegajo, setViewingLegajo] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [lastSyncCount, setLastSyncCount] = useState(0);

  useEffect(() => {
    loadData().then(d => {
      setData(d);
      const fromForm = d.solicitudes.filter(s => s._fromForm).length;
      if (fromForm > 0) setLastSyncCount(fromForm);
      setLoading(false);
    });
  }, []);

  const handleSync = async () => {
    setSyncing(true);
    // Reload from API (form submissions go directly to API now)
    const freshData = await loadData();
    setData(freshData);
    const newFromForm = freshData.solicitudes.filter(s => s._fromForm).length;
    notify(`Datos actualizados — ${newFromForm} solicitud${newFromForm !== 1 ? "es" : ""} desde formulario web`);
    setSyncing(false);
  };

  const persist = useCallback(async (newData) => {
    setData(newData);
  }, []);

  const reloadData = async () => {
    const d = await loadData();
    setData(d);
    return d;
  };

  const notify = (msg, type = "success") => {
    setNotification({ msg, type });
    setTimeout(() => setNotification(null), 3000);
  };

  const handleNewSolicitud = () => {
    setEditingSolicitud(emptySolicitud());
    setShowForm(true);
  };

  const handleEditSolicitud = (sol) => {
    setEditingSolicitud({ ...sol });
    setShowForm(true);
  };

  const handleSaveSolicitud = async () => {
    const s = editingSolicitud;
    if (!s.apellidos || !s.nombres || !s.nroDoc || !s.programa) {
      notify("Completá los campos obligatorios: Apellidos, Nombres, Nº Doc y Programa", "error");
      return;
    }
    const existing = data.solicitudes.findIndex(x => x.id === s.id);
    try {
      if (existing >= 0) {
        await apiUpdate(s);
      } else {
        await apiCreate(s);
      }
      await reloadData();
      setShowForm(false);
      setEditingSolicitud(null);
      notify(existing >= 0 ? "Solicitud actualizada" : "Solicitud creada");
    } catch (e) {
      notify("Error al guardar: " + e.message, "error");
    }
  };

  const handleDeleteSolicitud = async (id) => {
    if (!confirm("¿Eliminar esta solicitud?")) return;
    try {
      await apiDelete(id);
      await reloadData();
      notify("Solicitud eliminada");
    } catch (e) {
      notify("Error al eliminar", "error");
    }
  };

  const handleResetData = async () => {
    if (!confirm("¿Borrar TODOS los datos? Esta acción no se puede deshacer.")) return;
    for (const s of data.solicitudes) {
      await apiDelete(s.id);
    }
    await reloadData();
    notify("Datos eliminados");
  };

  // Inline update for admision grid — optimistic local + debounced API
  const debounceTimers = useRef({});
  const inlineUpdate = (sol, field, value) => {
    const updated = { ...sol, [field]: value };
    // Optimistic local update
    setData(prev => ({
      ...prev,
      solicitudes: prev.solicitudes.map(x => x.id === sol.id ? updated : x),
    }));
    // Debounce API call
    clearTimeout(debounceTimers.current[sol.id]);
    debounceTimers.current[sol.id] = setTimeout(() => {
      apiUpdate(updated).catch(e => console.error("Update error:", e));
    }, 500);
  };

  if (loading || !data) {
    return (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", flexDirection: "column", gap: 16 }}>
        <div style={{ width: 40, height: 40, border: `3px solid ${COLORS.border}`, borderTopColor: COLORS.primary, borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
        <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
        <span style={{ fontSize: 14, color: COLORS.textMid }}>Cargando SIGEU...</span>
      </div>
    );
  }

  const filteredSolicitudes = data.solicitudes.filter(s => {
    const term = searchTerm.toLowerCase();
    const matchSearch = !term || s.apellidos.toLowerCase().includes(term) || s.nombres.toLowerCase().includes(term) || s.nroDoc.includes(term);
    const matchProg = !filterPrograma || s.programa === filterPrograma;
    const matchEstado = !filterEstado || s.resultadoAdmision === filterEstado;
    return matchSearch && matchProg && matchEstado;
  });

  const stats = {
    total: data.solicitudes.length,
    admitidos: data.solicitudes.filter(s => s.resultadoAdmision === "Admitido").length,
    pendientes: data.solicitudes.filter(s => s.resultadoAdmision === "Pendiente").length,
    noAdmitidos: data.solicitudes.filter(s => s.resultadoAdmision === "No Admitido").length,
  };

  const navItems = [
    { id: "dashboard", label: "Dashboard", icon: "📊" },
    { id: "solicitudes", label: "Solicitudes", icon: "📋" },
    { id: "admision", label: "Admisión", icon: "✅" },
    { id: "cobranzas", label: "Cobranzas", icon: "💰" },
    { id: "alumnos", label: "Alumnos", icon: "🎓" },
    { id: "planes", label: "Plan de Estudios", icon: "📚" },
    { id: "legajos", label: "Legajos", icon: "📁" },
    { id: "config", label: "Config", icon: "⚙️" },
  ];

  return (
    <div style={{ display: "flex", minHeight: "100vh" }}>
      <style>{css}</style>

      {/* Sidebar */}
      <nav style={{
        width: 220, background: COLORS.primary, color: COLORS.white,
        display: "flex", flexDirection: "column", position: "fixed",
        height: "100vh", zIndex: 100,
      }}>
        {/* Logo */}
        <div style={{ padding: "24px 20px 20px", borderBottom: "1px solid rgba(255,255,255,0.12)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{
              width: 36, height: 36, borderRadius: 8,
              background: "rgba(255,255,255,0.15)", display: "flex",
              alignItems: "center", justifyContent: "center",
              fontSize: 11, fontWeight: 800, letterSpacing: "0.5px",
            }}>UC</div>
            <div>
              <div style={{ fontSize: 10, fontWeight: 400, opacity: 0.7, letterSpacing: "1px", textTransform: "uppercase" }}>Universidad del CEMA</div>
              <div style={{ fontSize: 15, fontWeight: 800, letterSpacing: "0.5px" }}>SIGEU</div>
            </div>
          </div>
          <div style={{ fontSize: 10, marginTop: 8, opacity: 0.5, fontWeight: 500 }}>Sistema de Gestión Universitaria</div>
        </div>

        {/* Nav */}
        <div style={{ padding: "12px 10px", flex: 1 }}>
          {navItems.map(item => (
            <button key={item.id} onClick={() => { setView(item.id); setViewingLegajo(null); }} style={{
              display: "flex", alignItems: "center", gap: 10, width: "100%",
              padding: "10px 14px", borderRadius: 8, fontSize: 13, fontWeight: 600,
              color: COLORS.white, background: view === item.id ? "rgba(255,255,255,0.18)" : "transparent",
              textAlign: "left", marginBottom: 2, transition: "background 0.15s",
            }}>
              <span style={{ fontSize: 15 }}>{item.icon}</span>
              {item.label}
            </button>
          ))}
        </div>

        <div style={{ padding: "12px 16px", borderTop: "1px solid rgba(255,255,255,0.12)", fontSize: 10, opacity: 0.4 }}>
          Admisiones de Grado<br />v2.0 — {currentYear()}
        </div>
      </nav>

      {/* Main */}
      <main style={{ flex: 1, marginLeft: 220, padding: "24px 32px" }}>
        {/* Notification */}
        {notification && (
          <div style={{
            position: "fixed", top: 20, right: 20, zIndex: 2000,
            padding: "12px 20px", borderRadius: 8, fontSize: 13, fontWeight: 600,
            background: notification.type === "error" ? COLORS.dangerBg : COLORS.successBg,
            color: notification.type === "error" ? COLORS.danger : COLORS.success,
            boxShadow: "0 4px 12px rgba(0,0,0,0.15)",
          }} className="fade-in">
            {notification.type === "error" ? "✕" : "✓"} {notification.msg}
          </div>
        )}

        {/* Dashboard */}
        {view === "dashboard" && (
          <div className="fade-in">
            <div style={{ marginBottom: 28 }}>
              <h1 style={{ fontSize: 24, fontWeight: 800, color: COLORS.textDark }}>Dashboard de Admisiones</h1>
              <p style={{ fontSize: 13, color: COLORS.textLight, marginTop: 4 }}>Año lectivo {currentYear()} — Departamento de Admisiones de Grado</p>
            </div>

            <div style={{ display: "flex", gap: 14, marginBottom: 28, flexWrap: "wrap" }}>
              <StatCard label="Total Solicitudes" value={stats.total} color={COLORS.primary} icon="📋" />
              <StatCard label="Admitidos" value={stats.admitidos} color={COLORS.success} icon="✅" />
              <StatCard label="Pendientes" value={stats.pendientes} color={COLORS.warning} icon="⏳" />
              <StatCard label="No Admitidos" value={stats.noAdmitidos} color={COLORS.danger} icon="✕" />
            </div>

            {/* Sync notification on load */}
            {lastSyncCount > 0 && (
              <Card style={{ marginBottom: 14, background: COLORS.successBg, border: `1px solid ${COLORS.success}30` }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontSize: 20 }}>🔄</span>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.success }}>
                      {lastSyncCount} solicitud{lastSyncCount > 1 ? "es" : ""} nueva{lastSyncCount > 1 ? "s" : ""} sincronizada{lastSyncCount > 1 ? "s" : ""}
                    </div>
                    <div style={{ fontSize: 12, color: COLORS.success, opacity: 0.8 }}>
                      Se importaron automáticamente desde el formulario de admisión web
                    </div>
                  </div>
                  <button className="btn-ghost btn-sm" onClick={() => setLastSyncCount(0)} style={{ marginLeft: "auto" }}>✕</button>
                </div>
              </Card>
            )}

            {/* Quick actions */}
            <Card>
              <h3 style={{ fontSize: 14, fontWeight: 700, marginBottom: 16, color: COLORS.textDark }}>Acciones Rápidas</h3>
              <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                <button className="btn-primary" onClick={handleNewSolicitud}>+ Nueva Solicitud</button>
                <button className="btn-secondary" onClick={() => setView("solicitudes")}>Ver Solicitudes</button>
                <button className="btn-secondary" onClick={() => setView("admision")}>Proceso de Admisión</button>
                <button className="btn-secondary" onClick={handleSync} disabled={syncing} style={{
                  display: "flex", alignItems: "center", gap: 6,
                  opacity: syncing ? 0.6 : 1,
                }}>
                  <span style={{ display: "inline-block", animation: syncing ? "spin 1s linear infinite" : "none" }}>🔄</span>
                  {syncing ? "Sincronizando..." : "Sincronizar Formularios"}

                      </div>
                    ) : null)}
                    {!s.fam1Apellidos && !s.fam1Parentesco && !s.fam2Apellidos && !s.fam2Parentesco && (
                      <p style={{ fontSize: 13, color: COLORS.textLight, fontStyle: "italic" }}>Sin datos familiares cargados</p>
                    )}
                  </Section>
                </Card>

                {/* Educación */}
                <Card>
                  <Section title="Educación" icon="🎓">
                    <div style={grid3}>
                      <Dato label="Nivel" value={s.eduNivel} />
                      <Dato label="Desde" value={s.eduDesde} />
                      <Dato label="Hasta" value={s.eduHasta} />
                      <Dato label="Carrera" value={s.eduCarrera} span={2} />
                      <Dato label="Título" value={s.eduTitulo} />
                      <Dato label="Establecimiento" value={s.eduEstablecimiento} span={3} />
                    </div>
                  </Section>
                  <Section title="Idiomas y Otros" icon="🌐">
                    <div style={grid3}>
                      <Dato label="Capacidad de Inglés" value={s.capacidadIngles} />
                      <Dato label="Premios" value={s.premios} />
                      <Dato label="Actividades" value={s.actividades} />
                    </div>
                    {s.observaciones && <div style={{ marginTop: 10 }}><Dato label="Observaciones" value={s.observaciones} span={3} /></div>}
                  </Section>
                </Card>

                {/* Admisión */}
                <Card style={{ border: `2px solid ${s.resultadoAdmision === "Admitido" ? COLORS.success + "40" : s.resultadoAdmision === "No Admitido" ? COLORS.danger + "40" : COLORS.border}` }}>
                  <Section title="Resultado de Admisión" icon="📋">
                    <div style={grid3}>
                      <Dato label="Resultado" value={s.resultadoAdmision} />
                      <Dato label="Método" value={s.metodoAdmision} />
                      <Dato label="Fecha de Admisión" value={s.fechaAdmision} />
                    </div>
                    <div style={{ ...grid3, marginTop: 14, padding: "12px 14px", background: "#fafafa", borderRadius: 8 }}>
                      <Dato label="Calif. Examen" value={s.calificacionExamen} />
                      <Dato label="Calif. Antecedentes" value={s.calificacionAntecedentes} />
                      <Dato label="Calif. Entrevista" value={s.calificacionEntrevista} />
                      <Dato label="Resultado Global" value={s.notaGlobal} />
                      <Dato label="R. Lectocomprensión" value={s.notaLectoComprension} />
                      <Dato label="R. Matemática" value={s.notaMatematica} />
                    </div>
                  </Section>
                  <Section title="Entrevista" icon="🗓">
                    <div style={grid3}>
                      <Dato label="Fecha Entrevista" value={s.fechaEntrevista} />
                      <Dato label="Realizada" value={s.entrevistaRealizada ? "Sí" : "No"} />
                    </div>
                  </Section>
                </Card>

                {/* Documentación */}
                <Card>
                  <Section title="Documentación" icon="📄">
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                      {DOCS_PRESENTAR.map(doc => {
                        const ok = s.docsEntregados?.includes(doc);
                        return (
                          <div key={doc} style={{
                            padding: "6px 10px", borderRadius: 6, fontSize: 12,
                            background: ok ? COLORS.successBg : "#fff5f5",
                            color: ok ? COLORS.success : COLORS.danger,
                            fontWeight: 600, display: "flex", alignItems: "center", gap: 6,
                          }}>
                            {ok ? "✓" : "✕"} {doc}
                          </div>
                        );
                      })}
                    </div>
                  </Section>
                </Card>

                {/* Responsable de pago */}
                <Card>
                  <Section title="Responsable de Pago" icon="💳">
                    <div style={grid3}>
                      <Dato label="Apellidos" value={s.rpApellidos} />
                      <Dato label="Nombres" value={s.rpNombres} />
                      <Dato label="Tel. Fijo" value={s.rpTelFijo} />
                      <Dato label="Celular" value={s.rpCelular} />
                      <Dato label="Email" value={s.rpEmail} span={2} />
                    </div>
                  </Section>
                  <div style={{
                    padding: "10px 14px", borderRadius: 8, fontSize: 13, fontWeight: 700,
                    background: s.pagado ? COLORS.successBg : COLORS.warningBg,
                    color: s.pagado ? COLORS.success : COLORS.warning,
                    textAlign: "center",
                  }}>
                    {s.pagado ? "✓ El alumno PAGÓ la reserva" : "⏳ El alumno NO PAGÓ la reserva"}
                  </div>
                </Card>
              </div>
            </div>
          );
        })()}

        {/* Cobranzas */}
        {view === "cobranzas" && (() => {
          const admitidos = data.solicitudes.filter(s => s.resultadoAdmision === "Admitido");
          const [selAlumno, setSelAlumno] = useState(null);
          const [matricula, setMatricula] = useState(null);
          const [cuotas, setCuotas] = useState([]);
          const [loadingCob, setLoadingCob] = useState(false);

          const loadCobranza = async (sol) => {
            setSelAlumno(sol);
            setLoadingCob(true);
            try {
              const mRes = await fetch(`/api/matriculas/${sol.id}`);
              const mData = await mRes.json();
              if (!mData || !mData.id) {
                await fetch('/api/matriculas', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ solicitudId: sol.id, monto: 0 }) });
                const mRes2 = await fetch(`/api/matriculas/${sol.id}`);
                setMatricula(await mRes2.json());
              } else {
                setMatricula(mData);
              }
              await fetch(`/api/cuotas/generate/${sol.id}`, { method: 'POST' });
              const cRes = await fetch(`/api/cuotas/${sol.id}`);
              setCuotas(await cRes.json());
            } catch (e) { console.error(e); }
            setLoadingCob(false);
          };

          const toggleMatricula = async () => {
            if (!matricula) return;
            const updated = { ...matricula, pagado: !matricula.pagado, fechaPago: !matricula.pagado ? new Date().toISOString().split('T')[0] : null };
            await fetch(`/api/matriculas/${matricula.id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(updated) });
            setMatricula({ ...matricula, ...updated });
          };

          const toggleCuota = async (cuota) => {
            const updated = { ...cuota, pagado: !cuota.pagado, fechaPago: !cuota.pagado ? new Date().toISOString().split('T')[0] : null };
            await fetch(`/api/cuotas/${cuota.id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(updated) });
            setCuotas(prev => prev.map(c => c.id === cuota.id ? { ...c, pagado: updated.pagado ? 1 : 0, fecha_pago: updated.fechaPago } : c));
          };

          const meses = ['', 'Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];

          return (
            <div className="fade-in">
              <h1 style={{ fontSize: 24, fontWeight: 800, marginBottom: 20 }}>Cobranzas</h1>

              {!selAlumno ? (
                <div>
                  <Card style={{ marginBottom: 16 }}>
                    <p style={{ fontSize: 13, color: COLORS.textMid, marginBottom: 14 }}>Seleccioná un alumno admitido para gestionar matrícula y cuotas.</p>
                  </Card>
                  {admitidos.length === 0 ? (
                    <Card><EmptyState icon="💰" title="Sin admitidos" subtitle="No hay alumnos admitidos para gestionar cobranzas" /></Card>
                  ) : (
                    <Card>
                      <div style={{ overflowX: "auto" }}>
                        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                          <thead>
                            <tr style={{ borderBottom: `2px solid ${COLORS.border}` }}>
                              {["Apellidos", "Nombres", "Documento", "Programa", "Período", ""].map(h => (
                                <th key={h} style={{ textAlign: "left", padding: "10px 12px", fontSize: 11, fontWeight: 700, color: COLORS.textLight, textTransform: "uppercase" }}>{h}</th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {admitidos.map(s => (
                              <tr key={s.id} style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                                <td style={{ padding: "10px 12px", fontWeight: 600 }}>{s.apellidos}</td>
                                <td style={{ padding: "10px 12px" }}>{s.nombres}</td>
                                <td style={{ padding: "10px 12px", fontFamily: "monospace" }}>{s.nroDoc}</td>
                                <td style={{ padding: "10px 12px", fontWeight: 600, color: COLORS.primary }}>{s.programa}</td>
                                <td style={{ padding: "10px 12px" }}>{s.periodoIngreso}</td>
                                <td style={{ padding: "10px 12px" }}>
                                  <button className="btn-primary btn-sm" onClick={() => loadCobranza(s)}>Ver Cobranza</button>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </Card>
                  )}
                </div>
              ) : (
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
                    <button className="btn-secondary btn-sm" onClick={() => { setSelAlumno(null); setMatricula(null); setCuotas([]); }}>← Volver</button>
                    <div>
                      <h2 style={{ fontSize: 18, fontWeight: 700 }}>{selAlumno.apellidos}, {selAlumno.nombres}</h2>
                      <span style={{ fontSize: 12, color: COLORS.textLight }}>{selAlumno.programa} — {selAlumno.periodoIngreso}</span>
                    </div>
                  </div>

                  {loadingCob ? (
                    <Card><p style={{ textAlign: "center", padding: 40, color: COLORS.textLight }}>Cargando...</p></Card>
                  ) : (
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: 16 }}>
                      {/* Matrícula */}
                      <Card>
                        <Section title="Matrícula" icon="🎫">
                          {matricula && (
                            <div style={{ textAlign: "center" }}>
                              <div style={{
                                padding: "20px", borderRadius: 10, marginBottom: 14,
                                background: matricula.pagado ? COLORS.successBg : COLORS.dangerBg,
                                border: `2px solid ${matricula.pagado ? COLORS.success + "40" : COLORS.danger + "40"}`,
                              }}>
                                <div style={{ fontSize: 36, marginBottom: 8 }}>{matricula.pagado ? "✅" : "❌"}</div>
                                <div style={{ fontSize: 15, fontWeight: 700, color: matricula.pagado ? COLORS.success : COLORS.danger }}>
                                  {matricula.pagado ? "PAGADA" : "PENDIENTE"}
                                </div>
                                {matricula.fecha_pago && <div style={{ fontSize: 11, color: COLORS.textLight, marginTop: 4 }}>Pagó el {matricula.fecha_pago}</div>}
                              </div>
                              <button className={matricula.pagado ? "btn-secondary" : "btn-primary"} onClick={toggleMatricula} style={{ width: "100%" }}>
                                {matricula.pagado ? "Marcar como Impaga" : "Marcar como Pagada"}
                              </button>
                            </div>
                          )}
                        </Section>
                      </Card>

                      {/* Cuotas */}
                      <Card>
                        <Section title="Cuotas Mensuales" icon="📅">
                          {cuotas.length === 0 ? (
                            <p style={{ fontSize: 13, color: COLORS.textLight }}>Sin cuotas generadas</p>
                          ) : (
                            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 8 }}>
                              {cuotas.map(c => (
                                <div key={c.id} onClick={() => toggleCuota(c)} style={{
                                  padding: "12px", borderRadius: 8, cursor: "pointer", textAlign: "center",
                                  background: c.pagado ? COLORS.successBg : "#fff5f5",
                                  border: `1.5px solid ${c.pagado ? COLORS.success + "40" : COLORS.danger + "30"}`,
                                  transition: "all 0.15s",
                                }}>
                                  <div style={{ fontSize: 11, fontWeight: 700, color: COLORS.textLight, textTransform: "uppercase" }}>{meses[c.mes]} {c.anio}</div>
                                  <div style={{ fontSize: 20, margin: "6px 0" }}>{c.pagado ? "✅" : "⏳"}</div>
                                  <div style={{ fontSize: 11, fontWeight: 600, color: c.pagado ? COLORS.success : COLORS.danger }}>
                                    {c.pagado ? "Pagada" : "Adeuda"}
                                  </div>
                                </div>
                              ))}
                            </div>
                          )}
                          <div style={{ marginTop: 14, padding: "10px 14px", borderRadius: 8, background: "#fafafa", fontSize: 12, color: COLORS.textMid }}>
                            Resumen: {cuotas.filter(c => c.pagado).length}/{cuotas.length} cuotas pagas — {cuotas.filter(c => !c.pagado).length} adeudada{cuotas.filter(c => !c.pagado).length !== 1 ? "s" : ""}
                          </div>
                        </Section>
                      </Card>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })()}

        {/* Alumnos - Materias */}
        {view === "alumnos" && (() => {
          const admitidos = data.solicitudes.filter(s => s.resultadoAdmision === "Admitido");
          const [selAlumno, setSelAlumno] = useState(null);
          const [materias, setMaterias] = useState([]);
          const [loadingMat, setLoadingMat] = useState(false);

          const loadMaterias = async (sol) => {
            setSelAlumno(sol);
            setLoadingMat(true);
            try {
              const res = await fetch(`/api/alumno-materias/assign/${sol.id}`, { method: 'POST' });
              const data = await res.json();
              setMaterias(data.materias || []);
            } catch (e) { console.error(e); }
            setLoadingMat(false);
          };

          const updateMateria = async (mat, campo, valor) => {
            const body = { estado: mat.estado, nota: mat.nota, fechaAprobacion: mat.fecha_aprobacion };
            body[campo] = valor;
            if (campo === 'estado' && valor === 'Aprobada' && !body.fechaAprobacion) {
              body.fechaAprobacion = new Date().toISOString().split('T')[0];
            }
            const res = await fetch(`/api/alumno-materias/${mat.id}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
            const updated = await res.json();
            setMaterias(prev => prev.map(m => m.id === mat.id ? updated : m));
          };

          const estadosMateria = ["Pendiente", "Cursando", "Aprobada", "Desaprobada", "Libre"];

          return (
            <div className="fade-in">
              <h1 style={{ fontSize: 24, fontWeight: 800, marginBottom: 6 }}>Departamento de Alumnos</h1>
              <p style={{ fontSize: 13, color: COLORS.textLight, marginBottom: 20 }}>Carga de materias según plan de estudio</p>

              {!selAlumno ? (
                <div>
                  {admitidos.length === 0 ? (
                    <Card><EmptyState icon="🎓" title="Sin alumnos" subtitle="No hay alumnos admitidos" /></Card>
                  ) : (
                    <Card>
                      <div style={{ overflowX: "auto" }}>
                        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                          <thead>
                            <tr style={{ borderBottom: `2px solid ${COLORS.border}` }}>
                              {["Apellidos", "Nombres", "Documento", "Programa", ""].map(h => (
                                <th key={h} style={{ textAlign: "left", padding: "10px 12px", fontSize: 11, fontWeight: 700, color: COLORS.textLight, textTransform: "uppercase" }}>{h}</th>
                              ))}
                            </tr>
                          </thead>
                          <tbody>
                            {admitidos.map(s => (
                              <tr key={s.id} style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                                <td style={{ padding: "10px 12px", fontWeight: 600 }}>{s.apellidos}</td>
                                <td style={{ padding: "10px 12px" }}>{s.nombres}</td>
                                <td style={{ padding: "10px 12px", fontFamily: "monospace" }}>{s.nroDoc}</td>
                                <td style={{ padding: "10px 12px", fontWeight: 600, color: COLORS.primary }}>{s.programa}</td>
                                <td style={{ padding: "10px 12px" }}>
                                  <button className="btn-primary btn-sm" onClick={() => loadMaterias(s)}>Ver Materias</button>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </Card>
                  )}
                </div>
              ) : (
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
                    <button className="btn-secondary btn-sm" onClick={() => { setSelAlumno(null); setMaterias([]); }}>← Volver</button>
                    <div>
                      <h2 style={{ fontSize: 18, fontWeight: 700 }}>{selAlumno.apellidos}, {selAlumno.nombres}</h2>
                      <span style={{ fontSize: 12, color: COLORS.textLight }}>{selAlumno.programa} — Plan {selAlumno.plan}</span>
                    </div>
                    <div style={{ marginLeft: "auto", fontSize: 13, color: COLORS.textMid }}>
                      {materias.filter(m => m.estado === 'Aprobada').length}/{materias.length} aprobadas
                    </div>
                  </div>

                  {loadingMat ? (
                    <Card><p style={{ textAlign: "center", padding: 40, color: COLORS.textLight }}>Cargando materias...</p></Card>
                  ) : (
                    <div>
                      {[1, 2, 3].map(anio => {
                        const matAnio = materias.filter(m => m.anio_cursada === anio);
                        if (matAnio.length === 0) return null;
                        return (
                          <Card key={anio} style={{ marginBottom: 16 }}>
                            <h3 style={{ fontSize: 15, fontWeight: 700, color: COLORS.primary, marginBottom: 14 }}>Año {anio}</h3>
                            {[1, 2].map(cuat => {
                              const matCuat = matAnio.filter(m => m.cuatrimestre === cuat);
                              if (matCuat.length === 0) return null;
                              return (
                                <div key={cuat} style={{ marginBottom: 16 }}>
                                  <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.textLight, textTransform: "uppercase", marginBottom: 8, letterSpacing: "0.5px" }}>
                                    {cuat === 1 ? "1er" : "2do"} Cuatrimestre
                                  </div>
                                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                                    <thead>
                                      <tr style={{ borderBottom: `1px solid ${COLORS.border}` }}>
                                        <th style={{ textAlign: "left", padding: "6px 10px", fontSize: 10, fontWeight: 700, color: COLORS.textLight }}>CÓDIGO</th>
                                        <th style={{ textAlign: "left", padding: "6px 10px", fontSize: 10, fontWeight: 700, color: COLORS.textLight }}>MATERIA</th>
                                        <th style={{ textAlign: "left", padding: "6px 10px", fontSize: 10, fontWeight: 700, color: COLORS.textLight }}>ESTADO</th>
                                        <th style={{ textAlign: "left", padding: "6px 10px", fontSize: 10, fontWeight: 700, color: COLORS.textLight }}>NOTA</th>
                                      </tr>
                                    </thead>
                                    <tbody>
                                      {matCuat.map(m => (
                                        <tr key={m.id} style={{ borderBottom: `1px solid ${COLORS.border}08` }}>
                                          <td style={{ padding: "8px 10px", fontFamily: "monospace", fontSize: 11, color: COLORS.textLight }}>{m.codigo_materia}</td>
                                          <td style={{ padding: "8px 10px", fontWeight: 500 }}>{m.nombre_materia}</td>
                                          <td style={{ padding: "8px 10px" }}>
                                            <select value={m.estado} onChange={e => updateMateria(m, 'estado', e.target.value)} style={{
                                              width: 120, padding: "4px 8px", fontSize: 12, fontWeight: 600,
                                              color: m.estado === 'Aprobada' ? COLORS.success : m.estado === 'Desaprobada' ? COLORS.danger : m.estado === 'Cursando' ? COLORS.info : COLORS.textMid,
                                              borderColor: m.estado === 'Aprobada' ? COLORS.success + '40' : COLORS.border,
                                            }}>
                                              {estadosMateria.map(e => <option key={e}>{e}</option>)}
                                            </select>
                                          </td>
                                          <td style={{ padding: "8px 10px" }}>
                                            {(m.estado === 'Aprobada' || m.estado === 'Desaprobada') ? (
                                              <input type="number" min="1" max="10" value={m.nota || ''} style={{ width: 55, padding: "4px 8px", fontSize: 12, textAlign: "center" }}
                                                onChange={e => updateMateria(m, 'nota', parseFloat(e.target.value) || null)} />
                                            ) : <span style={{ color: COLORS.textLight, fontSize: 12 }}>—</span>}
                                          </td>
                                        </tr>
                                      ))}
                                    </tbody>
                                  </table>
                                </div>
                              );
                            })}
                          </Card>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })()}

        {/* Plan de Estudios */}
        {view === "planes" && (() => {
          const [selProg, setSelProg] = useState("");
          const [planMaterias, setPlanMaterias] = useState([]);
          const [loadingPlan, setLoadingPlan] = useState(false);

          const loadPlan = async (prog) => {
            setSelProg(prog);
            if (!prog) { setPlanMaterias([]); return; }
            setLoadingPlan(true);
            try {
              const res = await fetch(`/api/plan/${prog}`);
              setPlanMaterias(await res.json());
            } catch (e) { console.error(e); }
            setLoadingPlan(false);
          };

          return (
            <div className="fade-in">
              <h1 style={{ fontSize: 24, fontWeight: 800, marginBottom: 6 }}>Plan de Estudios</h1>
              <p style={{ fontSize: 13, color: COLORS.textLight, marginBottom: 20 }}>Materias predeterminadas por programa</p>

              <Card style={{ marginBottom: 16 }}>
                <Field label="Seleccionar Programa">
                  <select value={selProg} onChange={e => loadPlan(e.target.value)} style={{ maxWidth: 400 }}>
                    <option value="">— Elegir programa —</option>
                    {PROGRAMAS.map(p => <option key={p.codigo} value={p.codigo}>{p.codigo} — {p.nombre}</option>)}
                  </select>
                </Field>
              </Card>

              {loadingPlan && <Card><p style={{ textAlign: "center", padding: 40, color: COLORS.textLight }}>Cargando plan...</p></Card>}

              {!loadingPlan && selProg && planMaterias.length > 0 && (
                <div>
                  {[1, 2, 3].map(anio => {
                    const matAnio = planMaterias.filter(m => m.anio_cursada === anio);
                    if (matAnio.length === 0) return null;
                    return (
                      <Card key={anio} style={{ marginBottom: 16 }}>
                        <h3 style={{ fontSize: 15, fontWeight: 700, color: COLORS.primary, marginBottom: 14 }}>
                          Año {anio}
                          <span style={{ fontSize: 12, fontWeight: 500, color: COLORS.textLight, marginLeft: 10 }}>{matAnio.length} materias</span>
                        </h3>
                        {[1, 2].map(cuat => {
                          const matCuat = matAnio.filter(m => m.cuatrimestre === cuat);
                          if (matCuat.length === 0) return null;
                          return (
                            <div key={cuat} style={{ marginBottom: 16 }}>
                              <div style={{ fontSize: 12, fontWeight: 700, color: COLORS.textLight, textTransform: "uppercase", marginBottom: 8 }}>
                                {cuat === 1 ? "1er" : "2do"} Cuatrimestre
                              </div>
                              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 8 }}>
                                {matCuat.map(m => (
                                  <div key={m.id} style={{
                                    padding: "10px 14px", borderRadius: 8, background: "#faf9f7",
                                    border: `1px solid ${COLORS.border}`, display: "flex", alignItems: "center", gap: 10,
                                  }}>
                                    <span style={{ fontFamily: "monospace", fontSize: 11, color: COLORS.primary, fontWeight: 700, minWidth: 50 }}>{m.codigo_materia}</span>
                                    <span style={{ fontSize: 13 }}>{m.nombre_materia}</span>
                                  </div>
                                ))}
                              </div>
                            </div>
                          );
                        })}
                      </Card>
                    );
                  })}
                </div>
              )}

              {!loadingPlan && selProg && planMaterias.length === 0 && (
                <Card><EmptyState icon="📚" title="Sin materias" subtitle="No hay materias cargadas para este programa" /></Card>
              )}
            </div>
          );
        })()}

        {/* Config */}
        {view === "config" && (
          <div className="fade-in">
            <h1 style={{ fontSize: 24, fontWeight: 800, marginBottom: 20 }}>Configuración</h1>
            <Card>
              <Section title="Datos" icon="💾">
                <p style={{ fontSize: 13, color: COLORS.textMid, marginBottom: 16 }}>
                  Actualmente hay {data.solicitudes.length} solicitud{data.solicitudes.length !== 1 ? "es" : ""} registrada{data.solicitudes.length !== 1 ? "s" : ""}.
                </p>
                <button className="btn-danger" onClick={handleResetData}>Borrar todos los datos</button>
              </Section>
              <Section title="Programas Disponibles" icon="📚">
                <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 8 }}>
                  {PROGRAMAS.map(p => (
                    <div key={p.codigo} style={{
                      padding: "8px 14px", borderRadius: 6, background: "#fafafa",
                      border: `1px solid ${COLORS.border}`, fontSize: 13,
                    }}>
                      <span style={{ fontWeight: 700, color: COLORS.primary }}>{p.codigo}</span>
                      <span style={{ color: COLORS.textMid }}> — {p.nombre}</span>
                    </div>
                  ))}
                </div>
              </Section>
            </Card>
          </div>
        )}
      </main>

      {/* Modal */}
      <Modal open={showForm} onClose={() => { setShowForm(false); setEditingSolicitud(null); }}
        title={editingSolicitud?.apellidos ? `Editar: ${editingSolicitud.apellidos}, ${editingSolicitud.nombres}` : "Nueva Solicitud de Admisión"}
        wide>
        {editingSolicitud && (
          <SolicitudForm
            solicitud={editingSolicitud}
            onChange={setEditingSolicitud}
            onSave={handleSaveSolicitud}
            onCancel={() => { setShowForm(false); setEditingSolicitud(null); }}
          />
        )}
      </Modal>
    </div>
  );
}

// Mount the app
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
